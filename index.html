<script>
"use strict";

document.onreadystatechange = function () {
    if (document.readyState === "complete") {
        console.log('Document readyState complete, attempting to initialize reader');
        initializeReaderWhenReady();
    }
};

function initializeReaderWhenReady() {
    // Wait if ePubReader not yet defined
    if (typeof window.ePubReader === 'undefined') {
        console.log('Waiting for ePubReader to be defined...');
        setTimeout(initializeReaderWhenReady, 100);
        return;
    }
    
    console.log('ePubReader is defined, wrapping it');
    
    var originalRender = window.ePubReader;
    window.ePubReader = function(url, options) {
            console.log('ePubReader called with url:', url);
            var reader = originalRender(url, options);
            
            if (reader && reader.book && reader.rendition) {
                console.log('Reader, book, and rendition initialized');
                
                var syncProgress = function(location) {
                    if (!location || !location.start || !reader.book || !reader.book.locations) {
                        return;
                    }

                    var totalLocations = reader.book.locations.length();
                    if (!totalLocations) {
                        return;
                    }

                    var progressSlider = document.getElementById('progress-slider');
                    var progressPercent = document.getElementById('progress-percent');
                    var currentProgress = reader.book.locations.percentageFromCfi(location.start.cfi);
                    var progressValue = Math.round((currentProgress || 0) * 100);
                    var locationIndex = reader.book.locations.locationFromCfi(location.start.cfi);

                    if (progressSlider) {
                        var maxIndex = Math.max(totalLocations - 1, 0);
                        progressSlider.max = maxIndex;

                        if (typeof locationIndex === "number" && !isNaN(locationIndex)) {
                            progressSlider.value = Math.min(Math.max(locationIndex, 0), maxIndex);
                        } else {
                            progressSlider.value = Math.round((progressValue / 100) * maxIndex);
                        }
                    }

                    if (progressPercent) {
                        progressPercent.textContent = progressValue + '%';
                    }
                };

                reader.book.ready
                    .then(function() {
                        console.log('Book ready, generating locations');
                        return reader.book.locations.generate(1000);
                    })
                    .then(function() {
                        console.log('Locations generated');
                        if (reader.rendition && reader.rendition.currentLocation) {
                            syncProgress(reader.rendition.currentLocation());
                        }
                        // Hide loader when done
                        var loader = document.getElementById('loader');
                        if (loader) {
                            loader.style.display = 'none';
                        }
                    })
                    .catch(function(err) {
                        console.error('Error in book ready:', err);
                    });

                reader.rendition.on('relocated', function(location) {
                    syncProgress(location);

                    // Reapply reader styles because EPUB content can refresh between relocations
                    setTimeout(function() {
                        updateReadingSettings();
                    }, 30);

                    // Try to apply highlights for the new location
                    setTimeout(function() {
                        applyStoredHighlights();
                        refreshVisibleHighlightColors();
                    }, 500);
                });
                
                // Also apply highlights on resize (debounced)
                var resizeTimeout;
                window.addEventListener('resize', function() {
                    clearTimeout(resizeTimeout);
                    resizeTimeout = setTimeout(function() {
                        applyStoredHighlights();
                        refreshVisibleHighlightColors();
                    }, 600);
                });
            } else {
                console.error('Reader initialization failed');
            }
            
            return reader;
        };

        try {
            console.log('Calling original ePubReader to load EPUB file');
            window.reader = originalRender("matices-de-la-seguridad-en-ninos-para-prevenir-lesiones-no-intencionales.epub", {
                restore: true
            });
            console.log('ePubReader call completed');
        } catch(err) {
            console.error('Error calling ePubReader:', err);
            var loader = document.getElementById('loader');
            if (loader) {
                loader.innerHTML = '<p style="color: red; font-weight: bold;">Error loading EPUB file</p>';
            }
        }
        
        // Timeout safety: if loader not hidden after 60 seconds, force hide it
        setTimeout(function() {
            var loader = document.getElementById('loader');
            if (loader && loader.style.display !== 'none') {
                console.warn('Hiding loader due to timeout');
                loader.style.display = 'none';
            }
        }, 60000);
}


var readingSettings = {
    fontSize: 100,
    fontFamily: 'Georgia, serif',
    theme: 'light'
};

// DOM element cache
var domCache = {};

function getElement(id) {
    if (!domCache[id]) {
        domCache[id] = document.getElementById(id);
    }
    return domCache[id];
}

function getThemePalette(theme) {
    if (theme === 'dark') {
        return {
            background: '#121212',
            text: '#e6e6e6',
            link: '#8ab4ff'
        };
    }

    if (theme === 'sepia') {
        return {
            background: '#f4ecd8',
            text: '#4f3e2f',
            link: '#6b4f2a'
        };
    }

    return {
        background: '#ffffff',
        text: '#1f2937',
        link: '#1d4ed8'
    };
}

function applyThemeToIframe(doc, theme) {
    if (!doc) return;

    var palette = getThemePalette(theme);
    var styleId = 'reading-theme-override';
    var styleEl = doc.getElementById(styleId);

    if (!styleEl) {
        styleEl = doc.createElement('style');
        styleEl.id = styleId;
        (doc.head || doc.documentElement).appendChild(styleEl);
    }

    styleEl.textContent =
        'html, body { background: ' + palette.background + ' !important; color: ' + palette.text + ' !important; }' +
        'body, p, div, span, li, blockquote, td, th, h1, h2, h3, h4, h5, h6 { color: ' + palette.text + ' !important; }' +
        'a, a:link, a:visited { color: ' + palette.link + ' !important; max-width: 100% !important; word-break: break-word !important; overflow-wrap: break-word !important; display: inline-block; }' +
        'p, span, div, li, td, th { max-width: 100% !important; word-break: break-word !important; overflow-wrap: break-word !important; }';
}

function updateReadingSettings() {
    var viewer = getElement('viewer');
    if (viewer) {
        var iframe = viewer.querySelector('iframe');
        if (iframe && iframe.contentDocument && iframe.contentDocument.body) {
            var doc = iframe.contentDocument;
            var body = doc.body;
            body.style.fontSize = readingSettings.fontSize + '%';
            body.style.fontFamily = readingSettings.fontFamily;
            applyThemeToIframe(doc, readingSettings.theme);
        }
    }
    
    var fontSizeEl = getElement('font-size-value');
    var fontFamilyEl = getElement('font-family');
    if (fontSizeEl) fontSizeEl.textContent = readingSettings.fontSize + '%';
    if (fontFamilyEl) fontFamilyEl.value = readingSettings.fontFamily;
    
    document.body.classList.remove('theme-light', 'theme-sepia', 'theme-dark');
    document.body.classList.add('theme-' + readingSettings.theme);
    
    localStorage.setItem('readingSettings', JSON.stringify(readingSettings));
}

function applyTheme(theme) {
    readingSettings.theme = theme;
    updateReadingSettings();
}

document.addEventListener('DOMContentLoaded', function() {
    try {
        var savedSettings = localStorage.getItem('readingSettings');
        if (savedSettings) {
            readingSettings = JSON.parse(savedSettings);
        }
        updateReadingSettings();
    } catch(e) {
        console.error('Error loading settings:', e);
    }
    
    // Close modals
    var closeModals = function() {
        var settingsModal = getElement('settings-modal');
        var readingSettingsModal = getElement('reading-settings-modal');
        var overlay = document.querySelector('.overlay');
        if (settingsModal) settingsModal.classList.remove('md-show');
        if (readingSettingsModal) readingSettingsModal.classList.remove('md-show');
        if (overlay) overlay.classList.remove('md-show');
    };
    
    document.querySelectorAll('.closer').forEach(function(btn) {
        btn.addEventListener('click', closeModals);
    });
    
    var settingBtn = getElement('setting');
    if (settingBtn) {
        settingBtn.addEventListener('click', function(e) {
            e.preventDefault();
            e.stopImmediatePropagation();
            var readingSettingsModal = getElement('reading-settings-modal');
            var settingsModal = getElement('settings-modal');
            var overlay = document.querySelector('.overlay');
            if (settingsModal) settingsModal.classList.remove('md-show');
            if (readingSettingsModal) readingSettingsModal.classList.add('md-show');
            if (overlay) overlay.classList.add('md-show');
        }, true);
    }
    
    var fontIncreaseBtn = getElement('font-increase');
    if (fontIncreaseBtn) {
        fontIncreaseBtn.addEventListener('click', function() {
            if (readingSettings.fontSize < 200) {
                readingSettings.fontSize += 10;
                updateReadingSettings();
            }
        });
    }
    
    var fontDecreaseBtn = getElement('font-decrease');
    if (fontDecreaseBtn) {
        fontDecreaseBtn.addEventListener('click', function() {
            if (readingSettings.fontSize > 50) {
                readingSettings.fontSize -= 10;
                updateReadingSettings();
            }
        });
    }
    
    var fontFamilySelect = getElement('font-family');
    if (fontFamilySelect) {
        fontFamilySelect.addEventListener('change', function(e) {
            readingSettings.fontFamily = e.target.value;
            updateReadingSettings();
        });
    }
    
    document.querySelectorAll('.theme-btn').forEach(function(btn) {
        btn.addEventListener('click', function() {
            document.querySelectorAll('.theme-btn').forEach(function(b) {
                b.classList.remove('active');
            });
            this.classList.add('active');
            applyTheme(this.getAttribute('data-theme'));
        });
    });

    var activeThemeBtn = document.querySelector('.theme-btn[data-theme="' + readingSettings.theme + '"]');
    if (activeThemeBtn) {
        document.querySelectorAll('.theme-btn').forEach(function(btn) {
            btn.classList.remove('active');
        });
        activeThemeBtn.classList.add('active');
    }
    
    var progressSlider = getElement('progress-slider');
    if (progressSlider) {
        var navigateFromSlider = function(value) {
            if (!window.reader || !window.reader.book || !window.reader.book.locations || !window.reader.rendition) {
                return;
            }

            var locations = window.reader.book.locations;
            var total = locations.length();
            if (!total) {
                return;
            }

            var locationIndex = parseInt(value, 10);
            if (isNaN(locationIndex)) {
                return;
            }

            var maxIndex = Math.max(total - 1, 0);
            locationIndex = Math.min(Math.max(locationIndex, 0), maxIndex);

            var targetCfi = locations.cfiFromLocation(locationIndex);

            if (!targetCfi && maxIndex > 0) {
                targetCfi = locations.cfiFromPercentage(locationIndex / maxIndex);
            }

            if (targetCfi) {
                window.reader.rendition.display(targetCfi);
            }
        };

        progressSlider.addEventListener('input', function(e) {
            navigateFromSlider(e.target.value);
        });

        progressSlider.addEventListener('change', function(e) {
            navigateFromSlider(e.target.value);
        });
    }
});

var highlightsData = {};
var currentBookHighlights = [];

var defaultBookKey = "Matices de la seguridad en niños para prevenir lesiones no intencionales";

function getBookKey() {
    var bookTitle = getElement('book-title');
    var key = bookTitle ? bookTitle.textContent : null;
    return key || defaultBookKey;
}

function loadHighlights() {
    try {
        var stored = localStorage.getItem('highlights');
        if (stored) {
            highlightsData = JSON.parse(stored);
        }
        var key = getBookKey();
        currentBookHighlights = highlightsData[key] || [];
    } catch(e) {
        console.error('Error loading highlights:', e);
        highlightsData = {};
        currentBookHighlights = [];
    }
}

function saveHighlights() {
    try {
        var key = getBookKey();
        highlightsData[key] = currentBookHighlights;
        localStorage.setItem('highlights', JSON.stringify(highlightsData));
    } catch(e) {
        console.error('Error saving highlights:', e);
    }
}

function renderHighlightsList() {
    var list = getElement('highlights-list');
    if (!list) return;
    list.innerHTML = '';
    
    currentBookHighlights.forEach(function(hl, index) {
        var li = document.createElement('li');
        li.className = 'highlight-item highlight-color-' + hl.color;
        li.innerHTML = 
            '<div class="highlight-text">' + hl.text + '</div>' +
            '<div class="highlight-actions">' +
                '<button class="delete-highlight" data-index="' + index + '">Eliminar</button>' +
            '</div>';
        
        li.querySelector('.delete-highlight').addEventListener('click', function(e) {
            e.stopPropagation();
            currentBookHighlights.splice(index, 1);
            saveHighlights();
            renderHighlightsList();
        });
        
        li.addEventListener('click', function() {
            if (window.reader && window.reader.rendition && hl.cfi) {
                window.reader.rendition.display(hl.cfi);
            }
        });
        
        list.appendChild(li);
    });
}

function applyHighlightVisual(cfi, color) {
    if (!window.reader || !window.reader.rendition || !window.reader.rendition.annotations) {
        return;
    }
    
    var annotations = window.reader.rendition.annotations;
    var hash = encodeURI(cfi);
    
    if (annotations._annotations && annotations._annotations[hash]) {
        delete annotations._annotations[hash];
    }
    
    var data = { color: color };
    
    try {
        window.reader.rendition.annotations.highlight(cfi, data);
        setTimeout(function() {
            applyCustomColor(cfi, color, 0);
        }, 80);
    } catch(e) {
        console.error('Error creating highlight:', e);
    }
}

function styleHighlightElement(el, bgColor) {
    if (!el) {
        return;
    }

    el.style.fill = bgColor;
    el.style.fillOpacity = '0.34';
    el.style.stroke = bgColor;
    el.style.strokeOpacity = '0.75';
    el.style.strokeWidth = '0.8';

    var children = el.querySelectorAll('rect, path');
    children.forEach(function(child) {
        child.style.fill = bgColor;
        child.style.fillOpacity = '0.34';
        child.style.stroke = bgColor;
        child.style.strokeOpacity = '0.75';
        child.style.strokeWidth = '0.8';
    });
}

function getStoredHighlightColor(cfiRange) {
    var color = '';
    currentBookHighlights.forEach(function(hl) {
        if (!color && hl && hl.cfi === cfiRange) {
            color = hl.color || 'yellow';
        }
    });
    return color;
}

function applyCustomColor(cfi, color, attempt) {
    attempt = attempt || 0;
    var colorMap = {
        'yellow': '#ffe36d',
        'green': '#9ad8a0',
        'blue': '#9fcfff',
        'pink': '#f3a9c2'
    };
    var bgColor = colorMap[color] || colorMap.yellow;
    
    if (!window.reader || !window.reader.rendition || !window.reader.rendition.annotations) {
        return;
    }
    
    var annotations = window.reader.rendition.annotations;
    var hash = encodeURI(cfi);
    var applied = false;

    if (annotations._annotations && annotations._annotations[hash]) {
        var ann = annotations._annotations[hash];
        if (ann.mark && ann.mark.element) {
            styleHighlightElement(ann.mark.element, bgColor);
            applied = true;
        }
    }

    // Fallback: sometimes hash key differs slightly, match by cfiRange.
    if (!applied && annotations._annotations) {
        Object.keys(annotations._annotations).forEach(function(key) {
            var ann = annotations._annotations[key];
            if (!applied && ann && ann.cfiRange === cfi && ann.mark && ann.mark.element) {
                styleHighlightElement(ann.mark.element, bgColor);
                applied = true;
            }
        });
    }

    // Annotation element can be attached asynchronously after render.
    if (!applied && attempt < 15) {
        setTimeout(function() {
            applyCustomColor(cfi, color, attempt + 1);
        }, 120);
    }
}

function refreshVisibleHighlightColors() {
    if (!window.reader || !window.reader.rendition || !window.reader.rendition.annotations) {
        return;
    }

    var annotations = window.reader.rendition.annotations;
    if (!annotations._annotations) {
        return;
    }

    Object.keys(annotations._annotations).forEach(function(key) {
        var ann = annotations._annotations[key];
        if (!ann || !ann.cfiRange || !ann.mark || !ann.mark.element) {
            return;
        }

        var color = getStoredHighlightColor(ann.cfiRange);
        if (color) {
            applyCustomColor(ann.cfiRange, color, 0);
        }
    });
}

function getHighlightColor(colorName) {
    var colors = {
        'yellow': '#fff59d',
        'green': '#c8e6c9',
        'blue': '#bbdefb',
        'pink': '#f8bbd0'
    };
    return colors[colorName] || colors['yellow'];
}

var activeSearchToken = 0;

function normalizeHref(href) {
    if (!href) {
        return '';
    }

    var normalized = String(href)
        .replace(/^\.*\//, '')
        .split('#')[0]
        .trim();

    try {
        normalized = decodeURIComponent(normalized);
    } catch (e) {
        // Keep original normalized value when decode fails.
    }

    return normalized.toLowerCase();
}

function buildTocTitleMap() {
    var map = {};
    var nav = window.reader && window.reader.book ? window.reader.book.navigation : null;
    var toc = nav && nav.toc ? nav.toc : [];

    function walk(items) {
        if (!items || !items.length) {
            return;
        }

        items.forEach(function(item) {
            if (!item) {
                return;
            }

            var hrefKey = normalizeHref(item.href || item.url || item.path);
            var title = item.label || item.title || item.text || '';

            if (hrefKey && title && !map[hrefKey]) {
                map[hrefKey] = String(title).trim();
            }

            walk(item.subitems || item.items || item.children || []);
        });
    }

    walk(toc);
    return map;
}

function getSectionLabel(section, index, tocTitleMap) {
    var hrefCandidates = [
        section && section.href,
        section && section.url,
        section && section.canonical
    ];

    var label = '';
    hrefCandidates.forEach(function(candidate) {
        if (label) {
            return;
        }
        var key = normalizeHref(candidate);
        if (key && tocTitleMap[key]) {
            label = tocTitleMap[key];
        }
    });

    return {
        label: label || ('Capitulo ' + (index + 1)),
        needsFallback: !label
    };
}

function getChapterTitleFromBar() {
    var chapterTitle = getElement('chapter-title');
    if (!chapterTitle) {
        return '';
    }

    var title = (chapterTitle.textContent || '').trim();
    return title;
}

function foldText(value) {
    return String(value || '')
        .normalize('NFD')
        .replace(/[\u0300-\u036f]/g, '')
        .toLowerCase();
}

function foldTextWithMap(value) {
    var source = String(value || '');
    var folded = '';
    var map = [];

    for (var i = 0; i < source.length; i++) {
        var chunk = source.charAt(i).normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
        if (!chunk) {
            continue;
        }

        folded += chunk;
        for (var j = 0; j < chunk.length; j++) {
            map.push(i);
        }
    }

    return {
        folded: folded,
        map: map,
        source: source
    };
}

function searchSectionAccentInsensitive(section, query) {
    if (!section || !section.document || typeof section.cfiFromRange !== 'function') {
        return [];
    }

    var foldedQuery = foldText(query);
    if (!foldedQuery) {
        return [];
    }

    var results = [];
    var doc = section.document;
    var body = doc.body || doc.documentElement;
    if (!body) {
        return [];
    }

    var walker = doc.createTreeWalker(body, NodeFilter.SHOW_TEXT, null, false);
    var node;
    var maxResults = 60;

    while ((node = walker.nextNode()) && results.length < maxResults) {
        var rawText = node.textContent || '';
        if (!rawText.trim()) {
            continue;
        }

        var foldedNode = foldTextWithMap(rawText);
        if (!foldedNode.folded) {
            continue;
        }

        var fromIndex = 0;
        while (results.length < maxResults) {
            var matchIndex = foldedNode.folded.indexOf(foldedQuery, fromIndex);
            if (matchIndex === -1) {
                break;
            }

            var endFoldedIndex = matchIndex + foldedQuery.length - 1;
            var startOffset = foldedNode.map[matchIndex];
            var endOffset = foldedNode.map[endFoldedIndex] + 1;

            if (typeof startOffset !== 'number' || typeof endOffset !== 'number' || endOffset <= startOffset) {
                fromIndex = matchIndex + 1;
                continue;
            }

            try {
                var range = doc.createRange();
                range.setStart(node, startOffset);
                range.setEnd(node, endOffset);

                var cfi = section.cfiFromRange(range);
                if (cfi) {
                    var excerptStart = Math.max(0, startOffset - 60);
                    var excerptEnd = Math.min(rawText.length, endOffset + 60);
                    var excerpt = rawText.substring(excerptStart, excerptEnd).trim();
                    if (excerptStart > 0) excerpt = '...' + excerpt;
                    if (excerptEnd < rawText.length) excerpt += '...';

                    results.push({
                        cfi: cfi,
                        excerpt: excerpt
                    });
                }
            } catch (e) {
                // Ignore isolated range failures and keep searching.
            }

            fromIndex = matchIndex + foldedQuery.length;
        }
    }

    return results;
}

function escapeHtml(value) {
    return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
}

function renderSearchResults(results, query) {
    var searchResults = getElement('searchResults');
    if (!searchResults) {
        return;
    }

    searchResults.innerHTML = '';

    if (!results.length) {
        searchResults.innerHTML = '<li><p>No se encontraron resultados para "' + escapeHtml(query) + '".</p></li>';
        return;
    }

    results.forEach(function(result) {
        var li = document.createElement('li');
        var excerpt = escapeHtml(result.excerpt || '').trim();
        if (!excerpt) {
            excerpt = 'Resultado encontrado';
        }

        li.innerHTML =
            '<a href="#" data-cfi="' + escapeHtml(result.cfi || '') + '" data-fallback="' + (result.needsFallback ? '1' : '0') + '">' +
                '<span class="search-result-title">' + escapeHtml(result.label || 'Seccion') + '</span>' +
                '<p>' + excerpt + '</p>' +
            '</a>';

        var anchor = li.querySelector('a');
        anchor.addEventListener('click', function(e) {
            e.preventDefault();
            var cfi = this.getAttribute('data-cfi');
            if (window.reader && window.reader.rendition && cfi) {
                var displayResult = window.reader.rendition.display(cfi);

                if (this.getAttribute('data-fallback') === '1') {
                    var titleNode = this.querySelector('.search-result-title');
                    Promise.resolve(displayResult).then(function() {
                        setTimeout(function() {
                            var chapterTitle = getChapterTitleFromBar();
                            if (titleNode && chapterTitle) {
                                titleNode.textContent = chapterTitle;
                            }
                        }, 120);
                    });
                }
            }
        });

        searchResults.appendChild(li);
    });
}

function runBookSearch(query) {
    var searchResults = getElement('searchResults');
    if (!searchResults) {
        return;
    }

    var normalizedQuery = (query || '').trim();
    if (!normalizedQuery) {
        searchResults.innerHTML = '<li><p>Escribe una palabra o frase para buscar.</p></li>';
        return;
    }

    if (!window.reader || !window.reader.book || !window.reader.book.spine) {
        searchResults.innerHTML = '<li><p>El libro aun no esta listo para buscar.</p></li>';
        return;
    }

    var token = ++activeSearchToken;
    searchResults.innerHTML = '<li><p>Buscando...</p></li>';

    var spineItems = window.reader.book.spine.spineItems || window.reader.book.spine.items || [];
    if (!spineItems.length) {
        searchResults.innerHTML = '<li><p>No hay secciones disponibles para buscar.</p></li>';
        return;
    }

    var tocTitleMap = buildTocTitleMap();

    var bookLoad = typeof window.reader.book.load === 'function' ? window.reader.book.load.bind(window.reader.book) : null;

    var tasks = spineItems.map(function(section, index) {
        if (!section || typeof section.find !== 'function') {
            return Promise.resolve([]);
        }

        var loadPromise = typeof section.load === 'function' && bookLoad ? section.load(bookLoad) : Promise.resolve();

        return loadPromise
            .then(function() {
                var found = section.find(normalizedQuery) || [];
                if (!found.length) {
                    found = searchSectionAccentInsensitive(section, normalizedQuery);
                }
                return found.map(function(match) {
                    var labelInfo = getSectionLabel(section, index, tocTitleMap);
                    return {
                        cfi: match.cfi,
                        excerpt: match.excerpt,
                        label: labelInfo.label,
                        needsFallback: labelInfo.needsFallback
                    };
                });
            })
            .catch(function() {
                return [];
            })
            .then(function(matches) {
                if (typeof section.unload === 'function') {
                    section.unload();
                }
                return matches;
            });
    });

    Promise.all(tasks).then(function(chunks) {
        if (token !== activeSearchToken) {
            return;
        }

        var allResults = [];
        chunks.forEach(function(list) {
            if (list && list.length) {
                allResults = allResults.concat(list);
            }
        });

        renderSearchResults(allResults, normalizedQuery);
    }).catch(function(err) {
        if (token !== activeSearchToken) {
            return;
        }
        console.error('Search failed:', err);
        searchResults.innerHTML = '<li><p>Error al buscar. Intenta de nuevo.</p></li>';
    });
}

function applyStoredHighlights() {
    if (!window.reader || !window.reader.rendition) {
        return;
    }

    var currentLocation = null;
    if (typeof window.reader.rendition.currentLocation === 'function') {
        currentLocation = window.reader.rendition.currentLocation();
    }
    if (!currentLocation) {
        currentLocation = window.reader.rendition.location;
    }

    if (!currentLocation || !currentLocation.start) {
        return;
    }
    
    var currentIndex = currentLocation.start.index;
    
    var sectionHighlights = [];
    currentBookHighlights.forEach(function(hl) {
        try {
            var internalCfi = hl.cfi.replace('epubcfi(', '').replace(')', '');
            var parts = internalCfi.split('!');
            if (parts.length >= 2) {
                var sectionPart = parts[0];
                var spinePos = parseInt(sectionPart.split('/')[1], 10);
                if (spinePos === currentIndex) {
                    sectionHighlights.push(hl);
                }
            }
        } catch(e) {
            console.error('Error parsing highlight CFI:', e);
        }
    });
    
    if (sectionHighlights.length > 0) {
        sectionHighlights.forEach(function(hl) {
            applyHighlightVisual(hl.cfi, hl.color);
        });
    }
}

function getCurrentSectionCfiBase() {
    if (!window.reader || !window.reader.rendition || !window.reader.book || !window.reader.book.spine) {
        return '';
    }

    var location = null;
    if (typeof window.reader.rendition.currentLocation === 'function') {
        location = window.reader.rendition.currentLocation();
    }
    if (!location) {
        location = window.reader.rendition.location;
    }

    if (!location || !location.start || typeof location.start.index !== 'number') {
        return '';
    }

    var currentSection = window.reader.book.spine.get(location.start.index);
    return currentSection && currentSection.cfiBase ? currentSection.cfiBase : '';
}

function normalizeCfi(cfi, cfiBase) {
    if (!cfi || typeof cfi !== 'string') {
        return '';
    }

    if (cfi.indexOf('epubcfi(') === 0) {
        return cfi;
    }

    var base = cfiBase || getCurrentSectionCfiBase();
    if (!base) {
        return cfi;
    }

    return 'epubcfi(' + base + cfi + ')';
}

function buildCfiFromRangeForIframe(iframeWin, range) {
    if (!iframeWin || !range || !window.reader || !window.reader.rendition) {
        return '';
    }

    var rendition = window.reader.rendition;
    var contents = [];

    if (typeof rendition.getContents === 'function') {
        contents = rendition.getContents() || [];
    } else if (rendition.contents) {
        contents = rendition.contents;
    }

    var contentList = Array.isArray(contents) ? contents : [contents];
    var contentObj = null;

    contentList.forEach(function(content) {
        if (!contentObj && content && content.document === iframeWin.document) {
            contentObj = content;
        }
    });

    if (!contentObj && contentList.length > 0) {
        contentObj = contentList[0];
    }

    var cfi = '';
    if (contentObj && typeof contentObj.cfiFromRange === 'function') {
        cfi = contentObj.cfiFromRange(range) || '';
    } else if (contentObj && contentObj.epubcfi && typeof contentObj.epubcfi.cfiFromRange === 'function') {
        cfi = contentObj.epubcfi.cfiFromRange(range) || '';
    }

    return normalizeCfi(cfi, getCurrentSectionCfiBase());
}

function addHighlight(cfi, text, color) {
    var normalizedCfi = normalizeCfi(cfi);

    if (!normalizedCfi || normalizedCfi.indexOf('epubcfi(') !== 0) {
        console.warn('Skipping highlight: invalid CFI', cfi, normalizedCfi);
        return;
    }

    currentBookHighlights.push({
        cfi: normalizedCfi,
        text: text.substring(0, 200),
        color: color || 'yellow',
        date: new Date().toISOString()
    });
    saveHighlights();
    renderHighlightsList();
    applyHighlightVisual(normalizedCfi, color);
}

function setupHighlightListener() {
    function hideHighlightActions() {
        var actionDiv = getElement('highlight-actions');
        if (!actionDiv) return;
        actionDiv.style.display = 'none';
    }
    
    function showColorPicker(selectedText, cfi, range, iframeWin) {
        hideHighlightActions();
        
        var actionDiv = getElement('highlight-actions');
        if (!actionDiv) {
            console.error('highlight-actions element not found');
            return;
        }
        
        // Position the color picker based on the selection inside iframe coordinates.
        var rect = range ? range.getBoundingClientRect() : { bottom: 100, left: 100 };
        var frameRect = { top: 0, left: 0 };
        if (iframeWin && iframeWin.frameElement && iframeWin.frameElement.getBoundingClientRect) {
            frameRect = iframeWin.frameElement.getBoundingClientRect();
        }

        var popupTop = Math.max(10, frameRect.top + rect.bottom + 10);
        var popupLeft = Math.max(10, frameRect.left + rect.left);
        
        actionDiv.style.display = 'block';
        actionDiv.style.visibility = 'visible';
        actionDiv.style.opacity = '1';
        actionDiv.style.position = 'fixed';
        actionDiv.style.zIndex = '10000';
        actionDiv.style.top = popupTop + 'px';
        actionDiv.style.left = popupLeft + 'px';
        actionDiv.style.backgroundColor = 'transparent';
        actionDiv.style.padding = '0';
        actionDiv.style.boxShadow = 'none';
        actionDiv.style.maxWidth = 'none';
        
        actionDiv.innerHTML =
            '<div class="highlight-picker-card">' +
                '<p class="highlight-picker-title">Selecciona color:</p>' +
                '<div class="highlight-picker-options">' +
                    '<button type="button" class="hl-color-option" data-color="blue" title="Aqua" aria-label="Aqua">' +
                        '<span class="hl-swatch hl-swatch-blue"></span>' +
                        '<span class="hl-label">Aqua</span>' +
                    '</button>' +
                    '<button type="button" class="hl-color-option" data-color="pink" title="Pink" aria-label="Pink">' +
                        '<span class="hl-swatch hl-swatch-pink"></span>' +
                        '<span class="hl-label">Pink</span>' +
                    '</button>' +
                    '<button type="button" class="hl-color-option" data-color="yellow" title="Yellow" aria-label="Yellow">' +
                        '<span class="hl-swatch hl-swatch-yellow"></span>' +
                        '<span class="hl-label">Yellow</span>' +
                    '</button>' +
                    '<button type="button" class="hl-color-option" data-color="green" title="Green" aria-label="Green">' +
                        '<span class="hl-swatch hl-swatch-green"></span>' +
                        '<span class="hl-label">Green</span>' +
                    '</button>' +
                '</div>' +
            '</div>';
        console.log('Color picker shown');
        
        actionDiv.querySelectorAll('button').forEach(function(btn) {
            btn.addEventListener('click', function(e) {
                e.stopPropagation();
                var color = this.getAttribute('data-color');
                var finalCfi = cfi;

                if (!finalCfi && iframeWin) {
                    try {
                        var selNow = iframeWin.getSelection();
                        if (selNow && selNow.rangeCount > 0) {
                            finalCfi = buildCfiFromRangeForIframe(iframeWin, selNow.getRangeAt(0));
                        } else {
                            finalCfi = buildCfiFromRangeForIframe(iframeWin, range);
                        }
                    } catch (err) {
                        console.error('Error retrying CFI generation:', err);
                    }
                }

                if (!finalCfi) {
                    console.warn('Could not generate CFI for selected text');
                    hideHighlightActions();
                    return;
                }

                console.log('Adding highlight with color:', color);
                addHighlight(
                    finalCfi,
                    selectedText,
                    color
                );
                actionDiv.style.display = 'none';
                
                // Clear selection
                try {
                    if (iframeWin && iframeWin.getSelection) {
                        var sel = iframeWin.getSelection();
                        if (sel && sel.removeAllRanges) {
                            sel.removeAllRanges();
                        }
                    }
                } catch(e) {
                    console.error('Error clearing selection:', e);
                }
                
                hideHighlightActions();
            });
        });
    }
        

    function bindSelectionHandler(iframeWin) {
        if (!iframeWin || iframeWin.__highlightListenerBound) {
            return;
        }

        iframeWin.__highlightListenerBound = true;
        console.log('Binding selection handler to iframe');

        function processSelection(selectedText, range) {
            if (!selectedText || !range) {
                hideHighlightActions();
                return;
            }

            if (!window.reader || !window.reader.book) {
                console.warn('Reader or book not ready');
                hideHighlightActions();
                return;
            }

            var cfi = '';
            try {
                cfi = buildCfiFromRangeForIframe(iframeWin, range);
                if (cfi) {
                    console.log('CFI generated:', cfi);
                }
            } catch (err) {
                console.error('Error generating CFI:', err);
            }

            console.log('Showing color picker for text:', selectedText);
            showColorPicker(selectedText, cfi, range, iframeWin);
        }

        function scheduleSelectionProcessing() {
            try {
                var selection = iframeWin.getSelection ? iframeWin.getSelection() : null;
                if (!selection || selection.rangeCount === 0) {
                    hideHighlightActions();
                    return;
                }

                var selectedText = selection.toString().trim();
                if (!selectedText) {
                    hideHighlightActions();
                    return;
                }

                // Clone now so selection changes after mouseup/touchend won't lose coordinates.
                var range = selection.getRangeAt(0).cloneRange();
                setTimeout(function() {
                    processSelection(selectedText, range);
                }, 20);
            } catch (e) {
                console.error('Error in selection handler:', e);
                hideHighlightActions();
            }
        }

        iframeWin.addEventListener('mouseup', scheduleSelectionProcessing);
        iframeWin.addEventListener('touchend', function() {
            setTimeout(scheduleSelectionProcessing, 30);
        });
    }

    function trySetup() {
        var viewer = getElement('viewer');
        if (!viewer) {
            setTimeout(trySetup, 500);
            return;
        }
        
        var iframe = viewer.querySelector('iframe');
        if (!iframe) {
            setTimeout(trySetup, 500);
            return;
        }
        
        try {
            var iframeDoc = iframe.contentDocument || iframe.contentWindow.document;
            if (!iframeDoc) {
                setTimeout(trySetup, 500);
                return;
            }
        } catch(e) {
            // Cross-origin or not yet loaded
            setTimeout(trySetup, 500);
            return;
        }

        bindSelectionHandler(iframe.contentWindow);

        if (!window.__highlightOutsideClickBound) {
            window.__highlightOutsideClickBound = true;
            document.addEventListener('click', function(e) {
                var actionDiv = getElement('highlight-actions');
                if (!actionDiv || actionDiv.style.display === 'none') {
                    return;
                }
                if (!actionDiv.contains(e.target) && e.target.className !== 'hl-btn') {
                    hideHighlightActions();
                }
            });
        }

        // Hook into renderer changes
        if (window.reader && window.reader.rendition && !window.reader.__highlightRenderedHookBound) {
            window.reader.__highlightRenderedHookBound = true;
            window.reader.rendition.on('rendered', function() {
                hideHighlightActions();
                setTimeout(function() {
                    refreshVisibleHighlightColors();
                }, 120);
                // When page changes, reset and rebind
                setTimeout(trySetup, 50);
            });
        } else if (!window.reader || !window.reader.rendition) {
            // Try again if reader isn't ready
            setTimeout(trySetup, 300);
        }
    }
    
    trySetup();
}

document.addEventListener('DOMContentLoaded', function() {
    loadHighlights();
    renderHighlightsList();
    setupHighlightListener();
    
    function loadStoredHighlights() {
        if (window.reader && window.reader.book) {
            window.reader.book.ready.then(function() {
                currentBookHighlights.forEach(function(hl) {
                    applyHighlightVisual(hl.cfi, hl.color);
                });
            });
        } else {
            setTimeout(loadStoredHighlights, 1000);
        }
    }
    setTimeout(loadStoredHighlights, 2000);
    
    // Function to switch between views
    function switchView(viewName) {
        document.querySelectorAll('.show_view').forEach(function(el) {
            el.classList.remove('active');
        });
        
        document.querySelectorAll('.view').forEach(function(view) {
            view.style.display = 'none';
        });
    }
    
    // Search button
    var showSearchBtn = getElement('show-Search');
    if (showSearchBtn) {
        showSearchBtn.addEventListener('click', function() {
            switchView('Search');
            this.classList.add('active');

            var searchView = getElement('searchView');
            if (searchView) {
                searchView.style.display = 'block';
                searchView.style.visibility = 'visible';
            }

            var searchBox = getElement('searchBox');
            if (searchBox) {
                setTimeout(function() {
                    searchBox.focus();
                    searchBox.select();
                }, 20);
            }
        });
    }

    // TOC button
    var showTocBtn = getElement('show-Toc');
    if (showTocBtn) {
        showTocBtn.addEventListener('click', function() {
            switchView('Toc');
            this.classList.add('active');
            
            var tocView = getElement('tocView');
            if (tocView) {
                tocView.style.display = 'block';
                tocView.style.visibility = 'visible';
            }
        });
    }
    
    // Bookmarks button
    var showBookmarksBtn = getElement('show-Bookmarks');
    if (showBookmarksBtn) {
        showBookmarksBtn.addEventListener('click', function() {
            switchView('Bookmarks');
            this.classList.add('active');
            
            var bookmarksView = getElement('bookmarksView');
            if (bookmarksView) {
                bookmarksView.style.display = 'block';
                bookmarksView.style.visibility = 'visible';
            }
        });
    }
    
    // Highlights button
    var showHighlightsBtn = getElement('show-Highlights');
    if (showHighlightsBtn) {
        showHighlightsBtn.addEventListener('click', function() {
            switchView('Highlights');
            this.classList.add('active');
            
            var highlightsView = getElement('highlightsView');
            if (highlightsView) {
                highlightsView.style.display = 'block';
                highlightsView.style.visibility = 'visible';
            }
        });
    }

    var topSearchBtn = getElement('search-trigger');
    if (topSearchBtn) {
        topSearchBtn.addEventListener('click', function(e) {
            e.preventDefault();
            var sidebar = getElement('sidebar');
            if (sidebar) {
                sidebar.classList.add('open');
            }
            if (showSearchBtn) {
                showSearchBtn.click();
            }
        });
    }

    var searchBox = getElement('searchBox');
    var searchGo = getElement('search-go');

    if (searchBox) {
        searchBox.addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                runBookSearch(searchBox.value);
            }
        });
    }

    if (searchGo) {
        searchGo.addEventListener('click', function() {
            runBookSearch(searchBox ? searchBox.value : '');
        });
    }
});
